<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: radial-gradient(ellipse 120% 90% at 50% -5%, #EDE9FF 0%, #F0EEFF 20%, #F8F7FF 45%, #FFFFFF 70%);
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 64px 80px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: auto;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: #0A0A0A;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-name {
      font-size: 24px;
      font-weight: 800;
      color: #0A0A0A;
      letter-spacing: -0.03em;
    }

    .headline {
      font-size: 68px;
      font-weight: 800;
      color: #0A0A0A;
      letter-spacing: -0.04em;
      line-height: 1.0;
      text-align: center;
      max-width: 860px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .footer {
      text-align: center;
      font-family: 'SF Mono', 'Fira Mono', 'Courier New', monospace;
      font-size: 15px;
      color: #9CA3AF;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <!-- Logo top-left -->
  <div class="logo-row">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5C4.41 1.5 1.5 4.41 1.5 8s2.91 6.5 6.5 6.5S14.5 11.59 14.5 8 11.59 1.5 8 1.5z" stroke="white" stroke-width="1.2"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
        <path d="M8 3v1.5M8 11.5V13M3 8h1.5M11.5 8H13" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">ForkPulse</span>
  </div>

  <!-- Headline centered -->
  <div class="headline">
    Your GitHub repo has an audience you've never met.
  </div>

  <!-- URL bottom center -->
  <div class="footer">forkpulse.app</div>
</body>
</html>
